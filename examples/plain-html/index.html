<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CCAIS Embedded Chatbot Plain HTML Example</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f3f4f6;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CCAIS Embedded Chatbot</h1>
      <p>This page loads the standalone web component build.</p>
    </main>

    <script type="module" src="../../packages/core/dist/ccais-embedded-chatbot.js"></script>
    <ccais-chatbot
      chatbot-id="support"
      name="CCAIS Assistant"
      api-base-url="http://localhost:4000"
    ></ccais-chatbot>
  </body>
</html>
